name: Frontend CI/CD

on:
  push:
    branches: [web-servis]  # Замените на вашу ветку, если нужно
  pull_request:
    branches: [web-servis]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Укажите вашу версию Node

      - name: Install dependencies
        run: npm ci

      # - name: Run tests  # Раскомментируйте, если тесты есть
      #   run: npm test

      - name: Build project
        run: npm run build  # Сборка dist

      - name: Trigger Render Deploy
        if: github.ref == 'refs/heads/web-servis'  # Только для web-servis
        run: curl -X POST ${{ secrets.RENDER_WEBHOOK_URL }}