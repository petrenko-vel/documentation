name: Frontend CI/CD
on:
  push:
    branches: [web-servis]  # Триггер: пуш в web-servis (можно добавить pull_request для тестов)
  pull_request:
    branches: [web-servis]  # Для PR — только тесты

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # Виртуальная машина Linux (бесплатно)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Скачивает код репозитория

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Укажите вашу версию Node

      - name: Install dependencies
        run: npm ci  # Чистая установка (быстрее npm install)

      # - name: Run tests
      #   run: npm test  # Запуск тестов (если нет — пропустите)

      - name: Build project
        run: npm run build  # Сборка dist

      - name: Deploy to Render  # Пример деплоя (адаптируйте)
        if: github.ref == 'refs/heads/web-servis'  # Только для web-servis
        run: |
          # Установка Render CLI (если используете)
          npm install -g @render-com/cli
          # Авторизация и деплой (используйте секреты)
          render login --apiKey ${{ secrets.RENDER_API_KEY }}
          render deploy  # Или render deploy --service your-service-id
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}  # Секрет из GitHub